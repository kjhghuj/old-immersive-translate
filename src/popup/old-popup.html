<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="old-popup.css">
    <script src="detect-pdf.js"></script>
</head>

<body>
    <main class="popup-shell">
        <section class="popup-card">
            <header class="popup-header">
                <div class="popup-brand">
                    <div class="popup-brand__logo">
                        <img src="/icons/icon-32.png" alt="Universe Translate">
                    </div>
                    <div class="popup-brand__text">
                        <div class="popup-brand__title">Universe Translate</div>
                        <div class="popup-brand__subtitle">Translate the current page faster</div>
                    </div>
                </div>
                <a href="#" id="moreOptions" class="popup-link" data-i18n="msgOpenOptions">Options</a>
            </header>

            <section class="status-panel">
                <div class="status-panel__badge">AI</div>
                <div class="status-panel__content">
                    <label id="lblTranslate" class="status-title" data-i18n="lblTranslate">Translate this page to?</label>
                    <label id="lblTranslating" class="status-title" data-i18n="lblTranslating">Translating...</label>
                    <label id="lblTranslated" class="status-title" data-i18n="lblTranslated">Translated</label>
                    <label id="lblError" class="status-title status-title--error" data-i18n="lblError">It was not possible to translate this page</label>
                    <label id="lblTargetLanguage" class="field-label" data-i18n="lblTargetLanguage" data-i18n-ph-value="">Target language</label>
                </div>
            </section>

            <section class="field-panel">
                <select id="selectTargetLanguage" class="field-select" size>
                    <optgroup name="recents" label="recents" data-i18n-label="msgRecents"></optgroup>
                    <optgroup name="all" label="all" data-i18n-label="msgAll"></optgroup>
                </select>

                <div id="divAlwaysTranslateThisLang" class="toggle-row">
                    <input id="cbAlwaysTranslateThisLang" type="checkbox">
                    <label id="lblAlwaysTranslateThisLang" for="cbAlwaysTranslateThisLang" data-i18n="lblAlwaysTranslate">Always translate from</label>
                </div>
            </section>

            <section id="divIconTranslateContainer" class="service-panel">
                <button id="divIconTranslate" class="service-switch" title="Switch between translation services" data-i18n-title="swapTranslationService">
                    <span class="service-switch__icon">
                        <img id="iconTranslate" src="/icons/google-translate-32.png" alt="">
                        <img id="iconSwap" src="/icons/swap-32.png" alt="">
                    </span>
                    <span class="service-switch__content">
                        <span class="service-switch__title">Translation service</span>
                        <span class="service-switch__subtitle">Click to switch engine</span>
                    </span>
                </button>
            </section>

            <section class="action-grid">
                <button id="btnTranslate" class="btn btn-primary" data-i18n="btnTranslate">Translate</button>
                <button id="btnRestore" class="btn btn-secondary" data-i18n="btnRestore">Show original</button>
                <button id="btnTryAgain" class="btn btn-primary" data-i18n="btnTryAgain">Try Again</button>
                <button id="btnReset" class="btn btn-secondary" data-i18n="btnReset">Reset</button>
            </section>

            <section class="toolbar-row">
                <div id="btnOptionsDiv" class="toolbar-menu">
                    <select id="btnOptions" class="toolbar-menu__native" size>
                        <option value="options" selected disabled hidden>Options</option>
                        <option value="changeLanguage" data-i18n="btnChangeLanguages">Change languages</option>
                        <option value="alwaysTranslateThisSite" data-i18n="btnAlwaysTranslate">Always translate this site</option>
                        <option value="neverTranslateThisSite" data-i18n="btnNeverTranslate">Never translate this site</option>
                        <option value="neverTranslateThisLanguage" data-i18n="btnNeverTranslateThisLanguage" style="display: none;">Never translate this language</option>
                        <option value="isShowDualLanguage" data-i18n="msgIsShowDualLanguage">Show dual language</option>
                        <option value="translateInExternalSite" data-i18n="btnOpenOnGoogleTranslate">Open in Google Translate</option>
                        <option value="moreOptions" data-i18n="btnMoreOptions">More options</option>
                    </select>
                    <div id="btnOptionB" class="toolbar-menu__button pointerIgnore" data-i18n="more">More</div>
                </div>
                <div id="divOptionsList"></div>
            </section>

            <footer class="popup-footer">
                <span class="popup-version">v__IMMERSIVE_TRANSLATE_VERSION__</span>
                <span class="popup-footer__tip">Inspired by an immersive quick-translate flow</span>
            </footer>
        </section>
    </main>

    <script src="/lib/languages.js"></script>
    <script src="/lib/config.js"></script>
    <script src="/lib/i18n.js"></script>
    <script src="old-popup.js"></script>
</body>

</html>
